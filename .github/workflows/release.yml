name: Release

# Versioning is driven by semantic-release on every push to main. It reads the
# Conventional Commits since the last release (feat -> minor, fix -> patch,
# feat!/BREAKING CHANGE -> major), computes the next version, creates the
# `v<version>` git tag, and publishes a GitHub Release with generated notes.
#
# `main` is protected (changes go through a PR), but semantic-release commits the
# updated CHANGELOG.md back to main via @semantic-release/git. For that direct push
# to be accepted, the RELEASE_TOKEN identity must be on the branch ruleset's BYPASS
# list (Repo → Settings → Rules → the main ruleset → Bypass list). Without that
# bypass the push is rejected (GH013) and the whole release aborts. The commit uses
# "[skip ci]" so it doesn't re-trigger this workflow.
#
# (Best practice would be to drop the in-repo changelog and let the GitHub Release
# notes be the single source of truth — no bypass needed — but this repo keeps an
# in-repo CHANGELOG.md by choice.)
#
# The tag (`v*`) then drives .github/workflows/desktop-release.yml, which builds the
# installers and attaches them + the auto-update manifests to that release.
#
# IMPORTANT: for the tag push to trigger the desktop build, semantic-release must
# push with a Personal Access Token (secret RELEASE_TOKEN) — tags pushed with the
# default GITHUB_TOKEN do NOT trigger other workflows. Without RELEASE_TOKEN the
# release is still created, but you must run desktop-release manually (or re-push
# the tag) to attach installers.
#
# npm publishing is TEMPORARILY DISABLED (pending a valid NPM_TOKEN + the
# @git-manager npm org). To re-enable: add @semantic-release/npm back to
# .releaserc.json, pass `-p @semantic-release/npm@12`, set NPM_TOKEN, and restore
# the install/build steps (the package must be built before publish).

on:
  push:
    branches: [main]

# Never run two releases at once; don't cancel an in-flight one.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create tags + releases
  issues: write # semantic-release comments on released issues
  pull-requests: write # …and PRs

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so commit-analyzer can see every commit
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic release
        env:
          # Prefer a PAT so the version tag triggers the desktop build; fall back
          # to GITHUB_TOKEN (release created, installers need a manual trigger).
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        # commit-analyzer, release-notes-generator and github ship with
        # semantic-release; changelog + git are extra plugins (they maintain and
        # commit CHANGELOG.md back to main — see the bypass note above).
        run: >-
          npx --yes
          -p semantic-release@24
          -p @semantic-release/changelog@6
          -p @semantic-release/git@10
          semantic-release
