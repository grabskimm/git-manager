name: Deploy landing site to Pages

# Publishes the static mini-site in /site to GitHub Pages.
# One-time setup: Settings → Pages → Build and deployment → Source → "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  # When a release is published the workflow runs on the tag ref, which the
  # github-pages environment protection won't let deploy. So on release we
  # don't deploy directly — we re-run this workflow against main (an allowed
  # ref); that dispatched run does the real build + deploy with the new version.
  release:
    types: [published]
  workflow_dispatch:

# Least-privilege token needed by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-flight runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # On a published release, re-run this workflow against main (deploys from a
  # tag are blocked by the github-pages environment protection). The dispatched
  # run is a workflow_dispatch on main, which builds + deploys normally.
  redeploy-on-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run the Pages deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --repo "$GITHUB_REPOSITORY" --ref main

  build:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Stamp the latest release tag into the footer so the shown version is
      # never stale (uses the release event's tag, else the latest release).
      - name: Stamp latest release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName 2>/dev/null || true)"
          fi
          if [ -n "$VERSION" ]; then
            echo "Stamping $VERSION into the footer"
            sed -i "s#<!--VERSION-->[^<]*<!--/VERSION-->#<!--VERSION-->$VERSION<!--/VERSION-->#" site/index.html
          else
            echo "No release found; leaving the default version in place"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    if: github.event_name != 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
