appId: com.gitmanager.desktop
productName: GitManager
copyright: Copyright © GitManager

# Pin the Electron version explicitly. In this npm workspace the `electron`
# devDependency is hoisted to the repo-root node_modules, so electron-builder's
# local "installed electron module" probe (run from packages/desktop) can't find
# it and otherwise fails with "Cannot compute electron version". Must match the
# devDependency in package.json.
electronVersion: 33.2.0

directories:
  output: release
  buildResources: build

# Only ship the compiled shell + production node_modules (which includes the
# @gitmanager/engine dependency and its native modules). The engine's bundled UI
# is served from inside that package.
files:
  - dist/**/*
  - package.json
  - "!**/*.ts"
  - "!**/*.map"

# Native modules (better-sqlite3, node-pty) cannot run from inside the asar
# archive — unpack them, and the engine code we spawn as a child process. Globs
# are "**/"-prefixed because, in the self-contained install, the engine's native
# deps may be nested under node_modules/@gitmanager/engine/node_modules.
asar: true
asarUnpack:
  - "**/*.node"
  - "**/@gitmanager/engine/**"
  - "**/better-sqlite3/**"
  - "**/node-pty/**"

# Native-module handling for the Electron ABI is done explicitly in CI (a single
# `electron-rebuild --only better-sqlite3` step) rather than by electron-builder.
# better-sqlite3 is a traditional V8 addon that needs an ABI-matched build;
# node-pty is N-API (node-addon-api) and is ABI-stable, so it must NOT be
# recompiled — forcing its rebuild here deadlocks the build. Hence npmRebuild off.
npmRebuild: false
nodeGypRebuild: false

# --- auto-update manifest + GitHub Release publishing -----------------------
# electron-builder emits latest.yml / latest-mac.yml / latest-linux.yml (the
# electron-updater equivalent of latest.json) alongside the installers and
# attaches everything to the GitHub Release.
publish:
  provider: github
  owner: grabskimm
  repo: git-manager
  releaseType: release

# --- Windows ----------------------------------------------------------------
win:
  # Required by the MSI (WiX) target — it hard-fails without an app icon, where
  # NSIS/dmg/AppImage fall back to the default Electron icon. Generated by
  # scripts/make-icon.mjs.
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: msi
      arch: [x64]
  # Authenticode: electron-builder picks up CSC_LINK/CSC_KEY_PASSWORD or an
  # Azure-signing afterSign hook from the environment; unsigned otherwise.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# --- macOS ------------------------------------------------------------------
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarization runs when APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  # are present in the environment; skipped (unsigned) otherwise.
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip # required by electron-updater for macOS auto-update
      arch: [arm64, x64]
dmg:
  writeUpdateInfo: true

# --- Linux ------------------------------------------------------------------
linux:
  category: Development
  maintainer: GitManager
  # Clean names so the .deb package isn't derived from the scoped npm name
  # ("@gitmanager/desktop", which is invalid for a Debian package / filename).
  executableName: gitmanager
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
